[platformio]
; The S3 1.46" builds by default (`pio run`); build another SKU with `pio run -e <env>`.
default_envs = blipscope-s3-146

; Shared build_src_filter fragments so exclusions live in ONE place and can't drift.
; The editions are separate compile-time products and are NOT self-#ifdef-gated, so a
; sibling's TUs must be excluded from every other product or they compile and link into
; the shipped/OTA image. Composing from these fragments means adding edition N+1 touches
; only its own env (drop radar TUs + all editions, then re-include its own dir):
;   radar env   : +<*> ${filters.editions_off}
;   edition env : +<*> ${filters.radar_off} ${filters.editions_off} +<its_dir/>
[filters]
; Radar-only translation units (dropped by every edition build).
radar_off = -<AircraftManager.cpp> -<MqttPublisher.cpp> -<SpecialAircraft.cpp> -<AircraftInfoFields.cpp> -<Logbook.cpp> -<models/>
; Every edition directory (dropped by the radar build and by every OTHER edition; each
; edition re-includes its own after this). src/astro/ is the shared ephemeris used only
; by Space, so it lives here and Space re-includes it.
editions_off = -<eam/> -<space/> -<astro/> -<seismic/> -<birding/> -<fishing/> -<claudescope/> -<speed/>

; Settings shared by every Blipscope SKU. Each [env:*] below picks a board and a
; -DBLIPSCOPE_VARIANT_* flag; the matching header in include/variants/ supplies pins,
; the display/touch driver selection, and capability flags. Adding a SKU = add one
; variant header + one [env:*] here; no shared firmware changes.
[common]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
; Pre-build patches re-applied on every build so they survive a fresh library install (.pio/
; is gitignored): (1) the ASYNC_RESPONCE_BUFF_SIZE #ifndef guard on ESPAsyncWebServer so the
; -D override below takes effect; (2) restore the shared LCD_CAM interrupt flag in LovyanGFX's
; RGB bus so the S3 RGB panel's interrupt can be allocated (see the script for the full why).
extra_scripts =
    pre:scripts/patch_async_buff.py
    pre:scripts/patch_lgfx_rgb_intr.py
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -Wall
    ; Shrink ESPAsyncWebServer's per-send buffer from 2x TCP_MSS (2872 B) to 1 KB so it
    ; fits a fragmented heap on the tightest board; roomier boards are unaffected.
    -DASYNC_RESPONCE_BUFF_SIZE=1024
; Default source set: the radar app. Every edition dir is dropped here (see [filters]);
; each edition env below re-includes only its own dir. Written as one shared exclusion
; list rather than per-env hand-maintained lists so adding edition N+1 can't silently
; leave a sibling's TUs linked into another product (they are not #ifdef-gated).
build_src_filter = +<*> ${filters.editions_off}
board_build.partitions = min_spiffs.csv
lib_deps =
    lovyan03/LovyanGFX @ 1.2.21
    tzapu/WiFiManager @ 2.0.17
    ESP32Async/ESPAsyncWebServer @ 3.11.1
    ESP32Async/AsyncTCP @ 3.4.10
    bblanchon/ArduinoJson @ 7.4.3
    knolleary/PubSubClient @ 2.8

; The original ESP32-C3 Kit (1.28" GC9A01) is retired -- S3 only. Its variant header
; (include/variants/c3_128.h) and the single-core guards it drove (banded render, heap-gated
; enrichment, touch/TLS bus serialization) stay in the tree behind their capability flags,
; inert on the PSRAM/dual-core S3 SKUs, in case the board is ever revived.

; ===================== Blipscope Pro 2.1 (S3 test board) ==============
; Waveshare ESP32-S3-Touch-LCD-2.1: ESP32-S3R8 + 2.1" round ST7701 480x480 RGB LCD +
; CST820 touch + QMI8658 IMU + buzzer. First S3 SKU and first RGB-bus panel. The panel/
; touch reset and the ST7701 init chip-select sit on a TCA9554 I2C expander; variant::
; BoardPreInit() (src/board/board_s3_touch21.cpp) drives it before tft.init(). PSRAM +
; dual-core, so the variant sets BANDED_RENDER=false / ENRICH_ALWAYS=true.
[env:blipscope-pro-s3-21]
extends = common
board = esp32-s3-devkitc-1                   ; generic S3; flash/PSRAM pinned below
board_build.arduino.memory_type = qio_opi    ; 16 MB QIO flash + 8 MB OCTAL PSRAM (the R8)
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv    ; the RGB build is larger than the C3's; 16 MB gives OTA room
build_flags =
    ${common.build_flags}
    -DBLIPSCOPE_VARIANT_S3_21
    -DBOARD_HAS_PSRAM
    ; NB: -DBLIPSCOPE_BRINGUP_DIAG (a ~10.5 s boot-time color-flash panel/PSRAM diagnostic,
    ; #ifdef block still in main.cpp) is intentionally OFF: this env ships in the CI release
    ; matrix, so the flag would run the diagnostic on every customer boot / OTA. Re-enable it
    ; only for a local bring-up build, never on a released env.
; Serial goes to UART0 (no ARDUINO_USB_CDC_ON_BOOT) -> use the board's CH343P UART USB port for
; upload + monitor; it auto-resets and doesn't drop on reboot, so it captures the full boot log.

; ===================== Blipscope 1.46 (S3 1.46" round) ================
; Waveshare ESP32-S3-Touch-LCD-1.46B: ESP32-S3R8 + 1.46" round 412x412 IPS (SPD2010 over QSPI) +
; SPD2010 touch + QMI8658 IMU + PCM5101 I2S speaker. The SPD2010 is a TDDI chip (display + touch in
; one), and LovyanGFX has neither driver, so both are custom: include/Panel_SPD2010.hpp (subclasses
; lgfx::Panel_AMOLED) and include/Touch_SPD2010.hpp (an lgfx::ITouch). Panel/touch reset sit on a
; TCA9554 expander driven by variant::BoardPreInit() (src/board/board_s3_touch146.cpp).
; LovyanGFX enables its QSPI bus automatically on the S3 (LGFX_USE_QSPI). This board uses native
; USB-CDC (303A:1001), so upload + monitor run over the USB-C port. PSRAM + dual-core:
; BANDED_RENDER=false / ENRICH_ALWAYS=true.
[env:blipscope-s3-146]
extends = common
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi    ; 16 MB QIO flash + 8 MB OCTAL PSRAM (the R8)
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv    ; 16 MB gives OTA room
build_flags =
    ${common.build_flags}
    -DBLIPSCOPE_VARIANT_S3_146
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1   ; native USB-CDC: upload + monitor over the USB-C port

; ===================== Blipscope 1.46 CLOUD (staging bench) ===========
; The S3 1.46" with -DFEATURE_CLOUD_FEED: the radar gains the "Blipscope Cloud"
; data source (default) backed by the proxy/ Worker -- one keep-alive TLS host,
; <=2 KB payloads, /v1/config-driven active/idle/night cadence, tap-to-enrich.
; Kept as a SEPARATE env pointed at STAGING until bench-verified; the release
; env above ships unchanged. Promotion later = move the flag + a production
; CLOUD_FEED_BASE into [env:blipscope-s3-146] and delete this env.
; The device key is NOT baked here (key policy: values never appear in the
; repo): paste it into the config page's "Access key" field after flashing, or
; add a local -DCLOUD_FEED_KEY=\"...\" build flag that never gets committed.
[env:blipscope-s3-146-cloud]
extends = env:blipscope-s3-146
build_flags =
    ${env:blipscope-s3-146.build_flags}
    -DFEATURE_CLOUD_FEED
    -DCLOUD_FEED_BASE=\"https://scopes-staging.valarsystems.com\"

; ===================== Missileer (EAM / HFGCS monitor) ================
; A separate compile-time PRODUCT built from the same repo and the same boards: -DFEATURE_EAM
; swaps the radar app for Missileer, the HFGCS EAM monitor (src/eam/). It reuses the shared infra (display,
; Wi-Fi, web config, storage, HTTP/TLS, OTA, ntfy) but NOT the radar/aircraft/ADS-B code, which
; build_src_filter strips. FW_OTA_PREFIX puts these on their own OTA channel (firmware-eam-<slug>.bin)
; so an EAM device never pulls a radar image for the same board. EAM_FEED_BASE is the build-flag
; default for the backend URL; it's overridable at runtime on the config page. It runs on the
; S3 1.46" AMOLED (the intended home for the EAM screens).

; ---- Missileer on the S3 1.46" SPD2010 AMOLED (dual-core + PSRAM, true black) ----
[env:missileer-s3-146]
extends = common
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
build_flags =
    ${common.build_flags}
    -DBLIPSCOPE_VARIANT_S3_146
    -DFEATURE_EAM
    -DFW_OTA_PREFIX=\"eam-\"
    -DEAM_FEED_BASE=\"https://valar-eam-feed.onrender.com\"   ; live backend default; still overridable at runtime in web config
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1   ; native USB-CDC: upload + monitor over the USB-C port
build_src_filter = +<*> ${filters.radar_off} ${filters.editions_off} +<eam/>

; ===================== Orbitscope (live space-data monitor) ===========
; A third compile-time PRODUCT from the same repo and boards: -DFEATURE_SPACE swaps the radar app
; for Orbitscope (src/space/) -- a desk window onto ISS / launches / space weather / deep-space
; probes. Reuses all the shared infra (display, Wi-Fi, web config, storage, HTTP/TLS, OTA, ntfy)
; but NOT the radar/aircraft/ADS-B code or the EAM cluster, which build_src_filter strips.
; FW_OTA_PREFIX puts it on its own OTA channel (firmware-space-<slug>.bin). It pulls directly from
; free public space APIs and bakes in NO backend; the optional valar-space-feed backend (Phase 3)
; is the runtime "space-base-url" config, defaulting to the SPACE_FEED_BASE flag (empty by default).
; Runs on the S3 1.46" AMOLED.
[env:orbitscope-s3-146]
extends = common
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
; Orbitscope adds the Hopperpop SGP4 library for on-device ISS pass prediction (LDF only
; compiles it into this env, since only src/space includes it).
lib_deps =
    ${common.lib_deps}
    ; Pinned to a commit (not the default branch): CI installs libdeps fresh every run, so an
    ; unpinned git dep would pull whatever HEAD is and could silently change the ISS pass math
    ; or break the release build. 7c82d31 == tag v1.0.3 == master at time of pin. Bump deliberately.
    https://github.com/Hopperpop/Sgp4-Library.git#7c82d31f9d9a286acde5ef55da8308fc93d2ba96
build_flags =
    ${common.build_flags}
    -DBLIPSCOPE_VARIANT_S3_146
    -DFEATURE_SPACE
    -DFW_OTA_PREFIX=\"space-\"
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1   ; native USB-CDC: upload + monitor over the USB-C port
build_src_filter = +<*> ${filters.radar_off} ${filters.editions_off} +<space/> +<astro/>

; ===================== Quakescope (USGS earthquake radar) =============
; A fourth compile-time PRODUCT from the same repo and boards: -DFEATURE_SEISMIC swaps the radar app
; for Quakescope, the Seismic edition (src/seismic/) -- a desk earthquake radar fed by the keyless USGS feed.
; Reuses all the shared infra (display, Wi-Fi, web config, storage, HTTP/TLS, OTA, ntfy) but NOT the
; radar/aircraft/ADS-B code, the EAM cluster, or the Space cluster, which build_src_filter strips.
; FW_OTA_PREFIX puts it on its own OTA channel (firmware-seismic-<slug>.bin). It pulls directly from
; the public USGS FDSN event API and bakes in NO backend; the optional "se-base-url" config is empty
; by default. Runs on the S3 1.46" AMOLED.
[env:quakescope-s3-146]
extends = common
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
build_flags =
    ${common.build_flags}
    -DBLIPSCOPE_VARIANT_S3_146
    -DFEATURE_SEISMIC
    -DFW_OTA_PREFIX=\"seismic-\"
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1   ; native USB-CDC: upload + monitor over the USB-C port
build_src_filter = +<*> ${filters.radar_off} ${filters.editions_off} +<seismic/>

; ===================== Quillscope (eBird sightings radar) =============
; A compile-time PRODUCT from the same repo and boards: -DFEATURE_BIRDING swaps the radar app for
; Quillscope, the Birding edition (src/birding/) -- notable bird sightings near you, live from the Cornell eBird API.
; Reuses all the shared infra (display, Wi-Fi, web config, storage, HTTP/TLS, OTA, ntfy) but NOT the
; radar/aircraft/ADS-B code, the EAM cluster, the Space cluster, or the Seismic cluster, which
; build_src_filter strips. FW_OTA_PREFIX puts it on its own OTA channel (firmware-birding-<slug>.bin).
; It bakes in NO key: the user supplies their own free eBird token in web config (X-eBirdApiToken).
; Runs on the S3 1.46".
[env:quillscope-s3-146]
extends = common
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
build_flags =
    ${common.build_flags}
    -DBLIPSCOPE_VARIANT_S3_146
    -DFEATURE_BIRDING
    -DFW_OTA_PREFIX=\"birding-\"
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1   ; native USB-CDC: upload + monitor over the USB-C port
build_src_filter = +<*> ${filters.radar_off} ${filters.editions_off} +<birding/>

; ===================== Reelscope (fishing-conditions console) =========
; A compile-time PRODUCT from the same repo and boards: -DFEATURE_FISHING swaps the radar app for the
; Fishing edition (src/fishing/, product name "Reelscope") -- a fishing-conditions console covering
; BOTH freshwater (USGS Water Services) and saltwater (NOAA CO-OPS tides + NDBC buoys), with on-device
; solunar/sun/moon (its own Solunar.cpp, not the shared src/astro/) and keyless Open-Meteo weather.
; Reuses all the shared infra but NOT the radar/aircraft/ADS-B code or any sibling edition (including
; src/astro/), which build_src_filter strips. FW_OTA_PREFIX -> firmware-fishing-<slug>.bin.
; It bakes in NO backend; the optional "fi-base-url" aggregator config is empty by default. Both water
; families are gated so a fresh-only or salt-only user never hits the other's APIs. Runs on the S3 1.46".
[env:reelscope-s3-146]
extends = common
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
build_flags =
    ${common.build_flags}
    -DBLIPSCOPE_VARIANT_S3_146
    -DFEATURE_FISHING
    -DFW_OTA_PREFIX=\"fishing-\"
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1   ; native USB-CDC: upload + monitor over the USB-C port
build_src_filter = +<*> ${filters.radar_off} ${filters.editions_off} +<fishing/>

; ===================== Claudescope (Claude usage limits monitor) ======
; A compile-time PRODUCT from the same repo and boards: -DFEATURE_CLAUDESCOPE swaps the radar app for
; the Claudescope edition (src/claudescope/) -- a desk gauge for your live Claude usage limits (session
; + weekly), fed by the on-LAN claudescope-sidecar (tools/claudescope-sidecar/), which holds the OAuth
; token and republishes the usage window as normalized JSON so the device never sees a credential.
; Reuses all the shared infra (display, Wi-Fi, web config, storage, HTTP/TLS, OTA, ntfy) but NOT the
; radar/aircraft/ADS-B code or any sibling edition, which build_src_filter strips. FW_OTA_PREFIX puts
; it on its own OTA channel (firmware-claudescope-<slug>.bin). It bakes in NO backend; the required
; "cl-base-url" (the sidecar's address) is empty by default. Runs on the S3 1.46".
[env:claudescope-s3-146]
extends = common
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
build_flags =
    ${common.build_flags}
    -DBLIPSCOPE_VARIANT_S3_146
    -DFEATURE_CLAUDESCOPE
    -DFW_OTA_PREFIX=\"claudescope-\"
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1   ; native USB-CDC: upload + monitor over the USB-C port
build_src_filter = +<*> ${filters.radar_off} ${filters.editions_off} +<claudescope/>

; ===================== Speedscope (MiniSpeedCam companion) ============
; A compile-time PRODUCT from the same repo and boards: -DFEATURE_SPEED swaps the radar app for the
; Speedscope edition (src/speed/) -- a desk speed-radar console that ties into a MiniSpeedCam
; (minispeedcam.com) over the LAN via its keyless /api/state (health + live proximity) and /api/events
; (recent passes) endpoints. Reuses all the shared infra (display, Wi-Fi, web config, storage, HTTP,
; OTA, ntfy) but NOT the radar/aircraft/ADS-B code or any sibling edition, which build_src_filter
; strips. FW_OTA_PREFIX puts it on its own OTA channel (firmware-speed-<slug>.bin). It bakes in NO
; backend; the optional "sc-base-url" proxy config is empty by default. Runs on the S3 1.46" AMOLED.
[env:speedscope-s3-146]
extends = common
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
build_flags =
    ${common.build_flags}
    -DBLIPSCOPE_VARIANT_S3_146
    -DFEATURE_SPEED
    -DFW_OTA_PREFIX=\"speed-\"
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1   ; native USB-CDC: upload + monitor over the USB-C port
build_src_filter = +<*> ${filters.radar_off} ${filters.editions_off} +<speed/>

