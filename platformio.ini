[platformio]
; The C3 Kit builds by default (`pio run`); build another SKU with `pio run -e <env>`.
default_envs = blipscope-kit-c3-128

; Settings shared by every Blipscope SKU. Each [env:*] below picks a board and a
; -DBLIPSCOPE_VARIANT_* flag; the matching header in include/variants/ supplies pins,
; the display/touch driver selection, and capability flags. Adding a SKU = add one
; variant header + one [env:*] here; no shared firmware changes.
[common]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
; Pre-build patches re-applied on every build so they survive a fresh library install (.pio/
; is gitignored): (1) the ASYNC_RESPONCE_BUFF_SIZE #ifndef guard on ESPAsyncWebServer so the
; -D override below takes effect; (2) restore the shared LCD_CAM interrupt flag in LovyanGFX's
; RGB bus so the S3 RGB panel's interrupt can be allocated (see the script for the full why).
extra_scripts =
    pre:scripts/patch_async_buff.py
    pre:scripts/patch_lgfx_rgb_intr.py
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -Wall
    ; Shrink ESPAsyncWebServer's per-send buffer from 2x TCP_MSS (2872 B) to 1 KB so it
    ; fits a fragmented heap on the tightest board; roomier boards are unaffected.
    -DASYNC_RESPONCE_BUFF_SIZE=1024
; Default source set: the radar app. The FEATURE_EAM cluster (src/eam/) is a separate
; compile-time product, so it's excluded here; the EAM envs below override this filter to
; pull in src/eam/ and drop the radar-only sources instead.
build_src_filter = +<*> -<eam/>
board_build.partitions = min_spiffs.csv
lib_deps =
    lovyan03/LovyanGFX @ 1.2.21
    tzapu/WiFiManager @ 2.0.17
    ESP32Async/ESPAsyncWebServer @ 3.11.1
    ESP32Async/AsyncTCP @ 3.4.10
    bblanchon/ArduinoJson @ 7.4.3
    knolleary/PubSubClient @ 2.8

; ============================ Blipscope Kit ============================
; ESP32-C3 + 1.28" round GC9A01 LCD + CST816 touch (the original board).
[env:blipscope-kit-c3-128]
extends = common
board = esp32-c3-devkitm-1
build_flags =
    ${common.build_flags}
    -DBLIPSCOPE_VARIANT_C3_128
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ===================== Blipscope Pro 2.1 (S3 test board) ==============
; Waveshare ESP32-S3-Touch-LCD-2.1: ESP32-S3R8 + 2.1" round ST7701 480x480 RGB LCD +
; CST820 touch + QMI8658 IMU + buzzer. First S3 SKU and first RGB-bus panel. The panel/
; touch reset and the ST7701 init chip-select sit on a TCA9554 I2C expander; variant::
; BoardPreInit() (src/board/board_s3_touch21.cpp) drives it before tft.init(). PSRAM +
; dual-core, so the variant sets BANDED_RENDER=false / ENRICH_ALWAYS=true.
[env:blipscope-pro-s3-21]
extends = common
board = esp32-s3-devkitc-1                   ; generic S3; flash/PSRAM pinned below
board_build.arduino.memory_type = qio_opi    ; 16 MB QIO flash + 8 MB OCTAL PSRAM (the R8)
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv    ; the RGB build is larger than the C3's; 16 MB gives OTA room
build_flags =
    ${common.build_flags}
    -DBLIPSCOPE_VARIANT_S3_21
    -DBOARD_HAS_PSRAM
    -DBLIPSCOPE_BRINGUP_DIAG      ; TEMP: repeat panel/PSRAM diag at boot (remove once the panel is up)
; Serial goes to UART0 (no ARDUINO_USB_CDC_ON_BOOT) -> use the board's CH343P UART USB port for
; upload + monitor; it auto-resets and doesn't drop on reboot, so it captures the full boot log.

; ===================== Blipscope 1.46 (S3 1.46" round) ================
; Waveshare ESP32-S3-Touch-LCD-1.46B: ESP32-S3R8 + 1.46" round 412x412 IPS (SPD2010 over QSPI) +
; SPD2010 touch + QMI8658 IMU + PCM5101 I2S speaker. The SPD2010 is a TDDI chip (display + touch in
; one), and LovyanGFX has neither driver, so both are custom: include/Panel_SPD2010.hpp (subclasses
; lgfx::Panel_AMOLED) and include/Touch_SPD2010.hpp (an lgfx::ITouch). Panel/touch reset sit on a
; TCA9554 expander driven by variant::BoardPreInit() (src/board/board_s3_touch146.cpp).
; LovyanGFX enables its QSPI bus automatically on the S3 (LGFX_USE_QSPI). This board uses native
; USB-CDC (303A:1001), so upload + monitor run over the USB-C port. PSRAM + dual-core:
; BANDED_RENDER=false / ENRICH_ALWAYS=true.
[env:blipscope-s3-146]
extends = common
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi    ; 16 MB QIO flash + 8 MB OCTAL PSRAM (the R8)
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv    ; 16 MB gives OTA room
build_flags =
    ${common.build_flags}
    -DBLIPSCOPE_VARIANT_S3_146
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1   ; native USB-CDC: upload + monitor over the USB-C port

; ===================== Blipscope EAM (Emergency Action Message) =======
; A separate compile-time PRODUCT built from the same repo and the same boards: -DFEATURE_EAM
; swaps the radar app for the HFGCS EAM monitor (src/eam/). It reuses the shared infra (display,
; Wi-Fi, web config, storage, HTTP/TLS, OTA, ntfy) but NOT the radar/aircraft/ADS-B code, which
; build_src_filter strips. FW_OTA_PREFIX puts these on their own OTA channel (firmware-eam-<slug>.bin)
; so an EAM device never pulls a radar image for the same board. EAM_FEED_BASE is the build-flag
; default for the backend URL; it's overridable at runtime on the config page. Two SKUs to start:
; the C3 Kit hardware and the S3 1.46" AMOLED (the intended home for the EAM screens).

; ---- EAM on the C3 Kit (ESP32-C3 + 1.28" GC9A01 LCD) ----
[env:blipscope-eam-c3-128]
extends = common
board = esp32-c3-devkitm-1
build_flags =
    ${common.build_flags}
    -DBLIPSCOPE_VARIANT_C3_128
    -DFEATURE_EAM
    -DFW_OTA_PREFIX=\"eam-\"
    -DEAM_FEED_BASE=\"https://eam.example.com\"   ; placeholder default; set the real backend in web config
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
; EAM source set: everything except the radar-only translation units.
build_src_filter =
    +<*>
    -<AircraftManager.cpp>
    -<MqttPublisher.cpp>
    -<SpecialAircraft.cpp>
    -<AircraftInfoFields.cpp>
    -<Logbook.cpp>
    -<models/>

; ---- EAM on the S3 1.46" SPD2010 AMOLED (dual-core + PSRAM, true black) ----
[env:blipscope-eam-s3-146]
extends = common
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
build_flags =
    ${common.build_flags}
    -DBLIPSCOPE_VARIANT_S3_146
    -DFEATURE_EAM
    -DFW_OTA_PREFIX=\"eam-\"
    -DEAM_FEED_BASE=\"https://eam.example.com\"   ; placeholder default; set the real backend in web config
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1   ; native USB-CDC: upload + monitor over the USB-C port
build_src_filter =
    +<*>
    -<AircraftManager.cpp>
    -<MqttPublisher.cpp>
    -<SpecialAircraft.cpp>
    -<AircraftInfoFields.cpp>
    -<Logbook.cpp>
    -<models/>

