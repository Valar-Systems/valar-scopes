[env:esp32-c3-devkitm-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
; Re-applies the ASYNC_RESPONCE_BUFF_SIZE #ifndef guard to ESPAsyncWebServer on every
; build so the -D override below survives a fresh library install (.pio/ is gitignored).
extra_scripts = pre:scripts/patch_async_buff.py
build_unflags = 
    -std=gnu++11
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17
    -Wall
    ; Shrink ESPAsyncWebServer's per-send buffer from 2x TCP_MSS (2872 B) to 1 KB.
    ; On the heap-starved C3 the default contiguous block often can't be allocated in
    ; a fragmented heap, so the config page silently never sends; a smaller buffer just
    ; sends in more chunks. Relies on the #ifndef guard patched into
    ; .pio/libdeps/.../ESPAsyncWebServer/src/WebResponseImpl.h (re-apply if that lib is
    ; reinstalled -- see notes; consider vendoring/forking for a permanent fix).
    -DASYNC_RESPONCE_BUFF_SIZE=1024
board_build.partitions = min_spiffs.csv
lib_deps =
    lovyan03/LovyanGFX @ 1.2.21
    tzapu/WiFiManager @ 2.0.17
    ESP32Async/ESPAsyncWebServer @ 3.11.1
    ESP32Async/AsyncTCP @ 3.4.10
    bblanchon/ArduinoJson @ 7.4.3
    knolleary/PubSubClient @ 2.8