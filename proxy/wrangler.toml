# Blipscope proxy -- Cloudflare Worker.
#
# The TOP-LEVEL config is what `wrangler dev` and the vitest-pool-workers tests
# read: it carries every binding the code needs but NO rate-limit bindings
# (those are an "unsafe" beta binding miniflare can't emulate; the code treats
# them as optional). Deploys always target an environment:
#
#   npx wrangler deploy --env staging
#
# Secrets (per environment, never in this file):
#   npx wrangler secret put BLIP_KEYS --env staging          # comma-separated device keys
#   npx wrangler secret put ADSB_LOL_API_KEY --env staging   # optional, when adsb.lol issues keys

name = "blipscope-proxy"
main = "src/index.ts"
compatibility_date = "2025-12-01"

# Pin the account explicitly. Without this wrangler calls /memberships to work out
# which account to target, which needs a User->User Details->Read permission the CI
# token deliberately does NOT have -- that token is scoped to Workers KV Storage:
# Edit and nothing else. Naming the account here keeps the token minimal instead of
# widening a write credential just so it can look up its own owner. It also pins
# deploys to one account, so a second account on this login can never receive them.
# An account ID is an identifier, not a credential: it grants nothing without a token.
account_id = "48822e896bb10c45aa6bfe139bcff3d1"

[vars]
UPSTREAM_ADSB_FI_ENABLED = "false"        # flip to "true" once commercial permission clears
UPSTREAM_AIRPLANES_LIVE_ENABLED = "false" # flip to "true" once commercial permission clears
ROUTE_ADSBDB_ENABLED = "true"             # route fallback; "false" once adsb.lol routeset recovers

[[kv_namespaces]]
binding = "ENRICH_KV"
id = "0000000000000000000000000000dev0" # placeholder: tests/dev run in-memory; real ids live per-env

[[analytics_engine_datasets]]
binding = "METRICS"
dataset = "blipscope_proxy"

# ===================== staging =====================
# scopes-staging.valarsystems.com (production will be scopes.valarsystems.com).
# Bindings are NOT inherited across environments, so everything is redeclared here.
[env.staging]
name = "blipscope-proxy-staging"
# workers.dev disabled: the account has no workers.dev subdomain registered
# (a one-time interactive dashboard step); the custom domain below is canonical.
workers_dev = false

routes = [
  { pattern = "scopes-staging.valarsystems.com", custom_domain = true }
]

# Failover feeds enabled 2026-07-10 (user ruling) during a multi-hour adsb.lol
# hard outage (502 from Worker AND residential -- their backend, not throttling).
# Permission emails to both operators remain the licensing to-do; staging traffic
# is bench-scale (single-digit devices).
[env.staging.vars]
# LICENSED-ONLY as of 2026-07-21 -- staging mirrors production so it stays a valid
# pre-flight rig. See "Upstream licensing posture" in README.md before re-enabling
# either of these.
UPSTREAM_ADSB_FI_ENABLED = "false"
UPSTREAM_AIRPLANES_LIVE_ENABLED = "false"
ROUTE_ADSBDB_ENABLED = "true"

# Full request logs on staging (low traffic). Production should sample --
# ~200 B/request of JSON at fleet scale is real Workers Logs money; see the
# README cost model. head_sampling_rate 0.05 keeps 1-in-20.
[env.staging.observability]
enabled = true
head_sampling_rate = 1

[[env.staging.kv_namespaces]]
binding = "ENRICH_KV"
id = "8b6e92ed802a4192b6b6c1399fdf96aa"

[[env.staging.analytics_engine_datasets]]
binding = "METRICS"
dataset = "blipscope_proxy_staging"

# Workers Rate Limiting binding (per-colo token buckets, 60 s period).
# RL_IP: a household NATs 1-3 devices behind one IP; the fastest tier polls every
# 2 s (30 rpm) + enrich taps, so 120 rpm covers 3 fast devices with margin.
# RL_KEY: fleet-wide abuse ceiling per colo (v1 ships ONE shared build key).
[[env.staging.unsafe.bindings]]
name = "RL_IP"
type = "ratelimit"
namespace_id = "1101"
simple = { limit = 120, period = 60 }

[[env.staging.unsafe.bindings]]
name = "RL_KEY"
type = "ratelimit"
namespace_id = "1102"
simple = { limit = 6000, period = 60 }

# ===================== production =====================
# scopes.valarsystems.com. Mirrors staging, with the launch-correct posture:
# failover feeds OFF until their commercial-use permission clears (README/ROADMAP
# licensing to-do), and sampled request logging (full logging is real money at
# fleet scale -- see the cost model).
#
# BEFORE FIRST DEPLOY, three account-specific steps (see proxy/README.md
# "Going to production"):
#   1. Create the prod KV namespace and paste its id below (replace the
#      REPLACE_ME placeholder): npx wrangler kv namespace create ENRICH_KV --env production
#   2. Set the secrets: npx wrangler secret put BLIP_KEYS --env production
#      (and DEVICE_KEY_SECRET if using per-device keys).
#   3. Add scopes.valarsystems.com as a custom domain (route below; the zone must
#      be on this Cloudflare account).
# The RL binding namespace_ids (2101/2102) are distinct from staging's so the
# token buckets don't collide.
[env.production]
name = "blipscope-proxy"
workers_dev = false

routes = [
  { pattern = "scopes.valarsystems.com", custom_domain = true }
]

# Failover feeds OFF at launch: adsb.lol is the licensed primary; adsb.fi and
# airplanes.live stay disabled until their operators grant commercial use (the
# open licensing to-do). Flip to "true" per feed only once permission clears.
[env.production.vars]
# LICENSED-ONLY as of 2026-07-21. adsb.lol (ODbL 1.0) is the only upstream cleared
# for commercial use, so it is the only one enabled.
#
# The 2026-07-18 bench soak ran with both failovers ON (owner-approved, private) to
# survive adsb.lol's shared-egress 429s. That was always scoped to the bench, and
# shipping pilot boards makes it customer traffic -- so it ends here, ahead of the
# flash rather than after it.
#   adsb.fi        -- never granted permission; also 403s our egress.
#   airplanes.live -- replied with PAID terms ($50/mo indie key, attribution +
#                     splash-screen branding). Undecided, and their FREE API is not
#                     being used while that is unresolved.
# Re-enable ONLY on a written commercial grant (or a paid plan) for the feed in
# question. See "Upstream licensing posture" in README.md.
UPSTREAM_ADSB_FI_ENABLED = "false"
UPSTREAM_AIRPLANES_LIVE_ENABLED = "false"
ROUTE_ADSBDB_ENABLED = "true"

# Runaway kill switch, NOT a performance target. CPU time excludes time waiting on
# I/O, so the real work here is JSON parse + nearest-N sort on the blips path;
# measured warm tiles are ~4 ms worker-side, so 200 ms is ~50x headroom. It exists
# to kill an infinite loop, not to shave milliseconds -- do not tune it tighter.
[env.production.limits]
cpu_ms = 200

# FULL logging during the pilot. A ~55-board fleet is ~250k req/day; at the old
# 1-in-20 an individual customer's requests were statistically invisible, which
# defeats the point of having logs when someone reports a problem. Revisit around
# a few hundred devices (see README "Request log sampling"), where the volume --
# not the debugging value -- starts to dominate.
[env.production.observability]
enabled = true
head_sampling_rate = 1.0

[[env.production.kv_namespaces]]
binding = "ENRICH_KV"
id = "733bf90056104f56be9492e62450a0bf"

[[env.production.analytics_engine_datasets]]
binding = "METRICS"
dataset = "blipscope_proxy"

# Same per-colo reasoning as staging (RL_IP: ~3 fast devices per household IP;
# RL_KEY: per-colo fleet ceiling). Distinct namespace_ids so prod and staging
# buckets are independent. Revisit RL_KEY once per-device keys spread the fleet
# across many buckets instead of one shared key.
[[env.production.unsafe.bindings]]
name = "RL_IP"
type = "ratelimit"
namespace_id = "2101"
simple = { limit = 120, period = 60 }

[[env.production.unsafe.bindings]]
name = "RL_KEY"
type = "ratelimit"
namespace_id = "2102"
simple = { limit = 6000, period = 60 }
