# Blipscope egress relay -- an adsb.lol reverse-proxy cache on a DEDICATED IP.
#
# Why this exists: Cloudflare Workers egress from a shared per-colo IP pool, and
# adsb.lol's anonymous limiter counts OTHER tenants' traffic against us -> 429s
# we can't control. This relay gives adsb.lol a single, stable, non-shared IP to
# rate-limit, and the Worker consumes tiles from here instead of hitting adsb.lol
# directly. All of the Worker's cache/SWR/circuit-breaker/failover logic is
# unchanged; only the upstream BASE moves. See relay/README.md.
#
# The Worker points UPSTREAM_ADSB_LOL_BASE at this box. Two of these behind the
# Worker's failover chain (relay-A primary, relay-B terminal) give relay HA.

proxy_cache_path /var/cache/nginx/adsblol levels=1:2 keys_zone=adsblol:10m
                 max_size=100m inactive=10m use_temp_path=off;

# The Worker must present this shared secret. Anything else -> 403, so the relay
# is not an open adsb.lol proxy for the world. Keep the real value OUT of git:
# render this file from a template, or `include` a root-only snippet that sets
# `map $http_x_relay_key $relay_ok { default 0; "<secret>" 1; }`.
map $http_x_relay_key $relay_ok {
    default                 0;
    "RELAY_KEY_PLACEHOLDER" 1;
}

# Log the upstream cache status AND adsb.lol's own status code, so the soak can
# measure the one honest unknown: the REAL per-IP 429 rate from a dedicated IP.
#   grep 'ustatus=429' relay.log | wc -l   ->  how often adsb.lol throttled US
#   awk -F'cache=| ' '{print $2}' | sort | uniq -c  ->  HIT/MISS/EXPIRED mix
log_format relay '$time_iso8601 cache=$upstream_cache_status status=$status '
                 'ustatus=$upstream_status rt=$request_time uri="$request_uri"';

server {
    listen 8080;                      # plain HTTP: put TLS at the edge (CF tunnel
    listen [::]:8080;                 # / orange-cloud) or terminate here for prod.
    server_name _;
    access_log /var/log/nginx/relay.log relay;

    # Re-resolve api.adsb.lol periodically (its IP can move); the variable in
    # proxy_pass forces runtime resolution instead of a start-time freeze.
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;

    location / {
        if ($relay_ok = 0) { return 403; }

        set $adsblol "api.adsb.lol";
        proxy_pass https://$adsblol;
        proxy_ssl_server_name on;
        proxy_ssl_name api.adsb.lol;
        proxy_set_header Host api.adsb.lol;
        proxy_set_header User-Agent "blipscope-relay";
        proxy_set_header X-Relay-Key "";   # never forward our secret upstream

        proxy_cache adsblol;
        proxy_cache_key "$request_uri";     # the Worker already quantizes tiles

        # THE scaling knob. Upstream request rate ~= (distinct hot tiles) / this.
        # 8 s keeps a desk radar current (the device dead-reckons between polls)
        # while collapsing the fleet to a trickle. Raise it if the soak shows
        # adsb.lol throttling a single IP at our volume; lower it for freshness.
        proxy_cache_valid 200 8s;
        proxy_cache_valid 429 500 502 503 504 1s;   # don't cache errors long

        # Collapse concurrent identical polls (many CF colos, same tile) into ONE
        # upstream fetch -- this is what actually caps our adsb.lol request rate.
        proxy_cache_lock on;
        proxy_cache_lock_timeout 6s;

        # Absorb adsb.lol's flakiness here instead of passing it to the fleet:
        # serve the last good tile while refreshing, or if adsb.lol errors/429s.
        proxy_cache_use_stale updating error timeout
                              http_429 http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;

        add_header X-Relay-Cache $upstream_cache_status always;
        proxy_connect_timeout 5s;
        proxy_read_timeout 8s;
    }
}
