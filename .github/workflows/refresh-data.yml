name: refresh-data

# Periodic refresh of the proxy's KV-backed datasets that track upstreams:
#   - the military airframe side table (Mictronics aircraft-database, ~weekly upstream)
#   - the airport overlay tiles (OurAirports)
# A Cloudflare Worker cron can't do the ~17k KV writes these need per run, so the
# refresh runs the ingest scripts from CI instead (they bulk-put via wrangler).
#
# Requires a repo/environment secret CLOUDFLARE_API_TOKEN (a token with Workers KV
# write on the target account). Without it the job is skipped, so a fork or a
# pre-launch repo doesn't fail weekly -- the guard step gates on the secret.
#
# The weekly schedule refreshes BOTH environments. Production is the one that
# matters to customers, but staging is the pre-flight test rig -- letting its
# military/airport data rot makes it a misleading place to check things before a
# production change, which is worse than not having it. fail-fast is off so a
# staging hiccup can never skip the production refresh.
#
# Manual runs (workflow_dispatch) take an `env` input: "production" (default),
# "staging", or "both".

on:
  schedule:
    - cron: "17 6 * * 1" # 06:17 UTC every Monday (off the hour to dodge cron congestion)
  workflow_dispatch:
    inputs:
      env:
        description: "which env to refresh"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
          - both

jobs:
  refresh:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # a staging failure must not abort the production refresh
      matrix:
        env: [production, staging]
    defaults:
      run:
        working-directory: proxy
    steps:
      - uses: actions/checkout@v4

      - name: Decide whether this env is in scope
        id: target
        run: |
          WANT="${{ github.event.inputs.env }}"
          # No input => scheduled run => refresh every env in the matrix.
          if [ -z "$WANT" ] || [ "$WANT" = "both" ] || [ "$WANT" = "${{ matrix.env }}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Manual run targeted '$WANT' -- skipping ${{ matrix.env }}."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Guard on the Cloudflare token
        id: guard
        if: steps.target.outputs.run == 'true'
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN not set -- skipping (expected before launch)."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.run == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: proxy/package-lock.json

      - name: Install deps
        if: steps.guard.outputs.run == 'true'
        run: npm ci

      - name: Refresh military airframe side table (${{ matrix.env }})
        if: steps.guard.outputs.run == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run ingest:mildb -- --env "${{ matrix.env }}"

      - name: Refresh airport tiles (${{ matrix.env }})
        if: steps.guard.outputs.run == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run ingest:airports -- --env "${{ matrix.env }}"
