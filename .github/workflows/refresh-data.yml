name: refresh-data

# Periodic refresh of the proxy's KV-backed datasets that track upstreams:
#   - the military airframe side table (Mictronics aircraft-database, ~weekly upstream)
#   - the airport overlay tiles (OurAirports)
# A Cloudflare Worker cron can't do the ~17k KV writes these need per run, so the
# refresh runs the ingest scripts from CI instead (they bulk-put via wrangler).
#
# Requires a repo/environment secret CLOUDFLARE_API_TOKEN (a token with Workers KV
# write on the target account). Without it the job is skipped, so a fork or a
# pre-launch repo doesn't fail weekly -- the guard step gates on the secret.
#
# Manual runs (workflow_dispatch) take an `env` input (default staging). The
# schedule targets staging until production exists; flip the default then.

on:
  schedule:
    - cron: "17 6 * * 1" # 06:17 UTC every Monday (off the hour to dodge cron congestion)
  workflow_dispatch:
    inputs:
      env:
        description: "wrangler env to load (staging | production)"
        required: true
        default: "staging"

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy
    steps:
      - uses: actions/checkout@v4

      - name: Guard on the Cloudflare token
        id: guard
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN not set -- skipping (expected before launch)."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.run == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: proxy/package-lock.json

      - name: Install deps
        if: steps.guard.outputs.run == 'true'
        run: npm ci

      - name: Refresh military airframe side table
        if: steps.guard.outputs.run == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run ingest:mildb -- --env "${{ github.event.inputs.env || 'staging' }}"

      - name: Refresh airport tiles
        if: steps.guard.outputs.run == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run ingest:airports -- --env "${{ github.event.inputs.env || 'staging' }}"
